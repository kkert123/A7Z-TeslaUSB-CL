<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeslaUSB CL — 登录</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
/* ── Login Page Specific ── */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--s4);
  background: var(--bg);
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: var(--s8);
  box-shadow: var(--shadow-lg);
  animation: loginIn 0.4s ease;
}

@keyframes loginIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.login-brand {
  text-align: center;
  margin-bottom: var(--s8);
}

.login-logo {
  width: 56px;
  height: 56px;
  margin: 0 auto var(--s4);
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: var(--r-lg);
}

.login-brand h1 {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--text);
}

.login-brand p {
  font-size: var(--text-sm);
  color: var(--text-muted);
  margin-top: var(--s1);
}

.login-form .form-group {
  margin-bottom: var(--s5);
}

.login-form .btn {
  width: 100%;
  padding: var(--s3) var(--s6);
  font-size: var(--text-base);
  margin-top: var(--s2);
}

.login-error {
  background: var(--danger-soft);
  color: var(--danger);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--r-md);
  padding: var(--s3) var(--s4);
  font-size: var(--text-sm);
  margin-bottom: var(--s4);
  display: none;
}

.login-error.show {
  display: block;
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%  { transform: translateX(-6px); }
  75%  { transform: translateX(6px); }
}

.login-footer {
  text-align: center;
  margin-top: var(--s6);
  font-size: var(--text-xs);
  color: var(--text-muted);
}

.login-spinner {
  display: none;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: var(--s2);
}

.login-form .btn.loading .login-spinner { display: inline-block; }
.login-form .btn.loading .btn-text { opacity: 0.7; }

/* Mobile */
@media (max-width: 480px) {
  .login-card {
    padding: var(--s6) var(--s5);
    border-radius: var(--r-lg);
  }
  .login-brand { margin-bottom: var(--s6); }
  .login-logo { width: 48px; height: 48px; }
}
</style>
</head>
<body class="login-page">

<div class="login-card">
  <!-- Brand -->
  <div class="login-brand">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l2-3h8l2 3h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2M5 17l-1 2M19 17l1 2M9 14h6M9 14a3 3 0 1 1-3-3M15 14a3 3 0 1 0 3-3"/>
      </svg>
    </div>
    <h1>TeslaUSB CL</h1>
    <p>Radxa A7Z · 哨兵云端备份系统</p>
  </div>

  <!-- Error message -->
  <div class="login-error" id="loginError"></div>

  <!-- Login form -->
  <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label" for="username">用户名</label>
      <input
        class="form-input"
        type="text"
        id="username"
        name="username"
        placeholder="请输入用户名"
        autocomplete="username"
        required
        autofocus
      >
    </div>

    <div class="form-group">
      <label class="form-label" for="password">密码</label>
      <input
        class="form-input"
        type="password"
        id="password"
        name="password"
        placeholder="请输入密码"
        autocomplete="current-password"
        required
      >
    </div>

    <button class="btn btn-primary" type="submit" id="loginBtn">
      <span class="login-spinner"></span>
      <span class="btn-text">登 录</span>
    </button>
  </form>

  <div class="login-footer">
    TeslaUSB CL &copy; 2026 · Radxa Cubie A7Z
  </div>
</div>

<script>
// ── Theme init ──
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.dataset.theme = saved;
})();

// ── Login handler ──
async function handleLogin(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');

  // Hide previous error
  errEl.classList.remove('show');

  if (!username || !password) {
    showError('请输入用户名和密码');
    return;
  }

  // Loading state
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await resp.json();

    if (data.success) {
      // Redirect to dashboard
      const next = new URLSearchParams(window.location.search).get('next') || '/';
      window.location.href = next;
    } else {
      showError(data.error || '登录失败，请检查用户名和密码');
    }
  } catch (err) {
    showError('网络错误：无法连接到服务器');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
}

// Enter key shortcut
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
  }
});
</script>

</body>
</html>
