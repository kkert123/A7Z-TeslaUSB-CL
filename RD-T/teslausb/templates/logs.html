{% extends "base.html" %}
{% block title %} — 实时日志{% endblock %}
{% block content %}
<div class="page-header">
  <h2>📋 实时日志</h2>
  <div class="btn-group">
    <button id="btn-pause" onclick="togglePause()" class="btn btn-ghost btn-sm">⏸ 暂停</button>
    <button onclick="clearLog()" class="btn btn-ghost btn-sm">🗑 清屏</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:var(--text-sm);color:var(--text-secondary);cursor:pointer;">
      <input type="checkbox" id="auto-scroll" checked> 自动滚动
    </label>
  </div>
</div>
<div id="log-box" class="log-box"><div id="log-content"></div></div>
{% endblock %}

{% block scripts %}
<script>
let paused=false,source=null;
function startStream(){
  source=new EventSource('/api/logs/stream');
  source.onmessage=function(e){if(paused)return;appendLine(JSON.parse(e.data));};
  source.onerror=function(){appendLine('[连接断开，5秒后重连...]');source.close();setTimeout(startStream,5000);};
}
function appendLine(text){const c=document.getElementById('log-content'),d=document.createElement('div');d.className='log-line';
if(/error|fail|fatal/i.test(text))d.classList.add('log-error');else if(/warn/i.test(text))d.classList.add('log-warn');else if(/success|ok|done/i.test(text))d.classList.add('log-success');
d.textContent=text;c.appendChild(d);while(c.children.length>500)c.removeChild(c.firstChild);
if(document.getElementById('auto-scroll').checked){const b=document.getElementById('log-box');b.scrollTop=b.scrollHeight;}}
function togglePause(){paused=!paused;document.getElementById('btn-pause').textContent=paused?'▶ 继续':'⏸ 暂停';}
function clearLog(){document.getElementById('log-content').innerHTML='';}
startStream();
</script>
{% endblock %}
