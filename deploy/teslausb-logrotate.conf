# TeslaUSB A7Z 项目日志轮转配置
# 部署位置: /etc/logrotate.d/teslausb
#
# 规则:
#   daily       - 每天轮转一次
#   rotate 7    - 保留最近 7 天
#   maxsize 10M - 超过 10MB 立即轮转（无需等 daily）
#   compress    - 轮转后 gzip 压缩
#   delaycompress - 最新一份不压缩（方便查看）
#   missingok   - 日志文件不存在时不报错
#   notifempty  - 空文件不轮转
#   copytruncate - 复制后截断原文件（不中断写入进程）

/var/log/teslausb-bgpreview.log
/var/log/teslausb-sentry.log
/var/log/teslausb.log
/var/log/teslausb-boot-notify.log
/var/log/teslausb-notify-retry.log
/var/log/wifi-smart-switch.log {
    daily
    rotate 7
    maxsize 10M
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
