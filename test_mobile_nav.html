<!DOCTYPE html>
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Nav Test</title>
<style>
  /* Copy the FULL relevant CSS from style.css for isolation testing */
  :root {
    --s1:4px;--s2:8px;--s3:12px;--s4:16px;--bg:#0a0e14;--bg-elevated:#11151c;--bg-card:#151a23;
    --bg-hover:#1c2230;--text:#e0e0e0;--text-secondary:#a0a0a0;--text-muted:#666;
    --nav-bg:#0d1117;--nav-border:rgba(255,255,255,0.06);--pri:#3b82f6;--accent:#f97316;
    --border:rgba(255,255,255,0.08);--shadow-lg:0 10px 25px rgba(0,0,0,0.5);
    --text-sm:0.8125rem;--text-base:0.9375rem;--text-lg:1.125rem;--r-sm:6px;--r-md:10px;
    --t:0.2s ease;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  
  /* DESKTOP NAV */
  .nav{position:sticky;top:0;z-index:98;background:var(--nav-bg);border-bottom:1px solid var(--nav-border);backdrop-filter:blur(12px)}
  .nav-inner{max-width:1280px;margin:0 auto;padding:0 var(--s4);height:56px;display:flex;align-items:center;gap:var(--s4)}
  .nav-brand{display:flex;align-items:center;gap:var(--s2);color:var(--text);font-weight:700;font-size:var(--text-lg);white-space:nowrap;flex-shrink:0}
  .nav-brand:hover{color:var(--text)}
  .nav-logo{color:var(--accent)}
  .nav-menu{display:flex;align-items:center;gap:2px;list-style:none;flex:1;overflow-x:auto;scrollbar-width:none}
  .nav-menu::-webkit-scrollbar{display:none}
  .nav-link{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);border-radius:var(--r-sm);color:var(--text-secondary);font-size:var(--text-sm);font-weight:500;white-space:nowrap;transition:all var(--t);text-decoration:none}
  .nav-link:hover{background:var(--bg-hover);color:var(--text)}
  .nav-link.active{background:rgba(59,130,246,0.1);color:var(--pri)}
  .nav-actions{display:flex;align-items:center;gap:var(--s2)}
  .menu-btn{display:none;background:none;border:none;cursor:pointer;width:36px;height:36px;padding:8px;flex-direction:column;justify-content:center;align-items:center;gap:5px;border-radius:var(--r-sm)}
  .menu-btn span{display:block;width:20px;height:2px;background:var(--text-secondary);border-radius:2px;transition:all 0.3s ease}
  .menu-btn:hover{background:var(--bg-hover)}
  .menu-btn.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
  .menu-btn.active span:nth-child(2){opacity:0}
  .menu-btn.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
  .overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.65)}
  .overlay.show{display:block}

  /* MOBILE NAV OVERLAY */
  @media(max-width:768px){
    .nav,.nav-inner{overflow:visible;contain:none;clip-path:none}
    .nav{z-index:98}
    .menu-btn{display:flex;position:relative;z-index:202}
    .nav-actions{z-index:202;position:relative}
    .overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.65)}
    .overlay.show{display:block}
    .nav-menu{
      position:fixed;top:0;left:0;bottom:0;width:280px;z-index:200;
      display:none;flex-direction:column;align-items:stretch;justify-content:flex-start;
      gap:2px;padding:68px 12px 24px;
      overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
      background:#0f1419;border-right:1px solid rgba(255,255,255,0.06);
      box-shadow:4px 0 32px rgba(0,0,0,0.7);
      flex:none;margin:0;list-style:none;transform:none;transition:none;
      white-space:normal;contain:none;clip:auto;clip-path:none;
      max-height:none;height:auto;-webkit-clip-path:none;
    }
    .nav-menu.open{display:flex}
    [data-theme="dark"] .nav-menu{background:#0f1419}
    .nav-menu::-webkit-scrollbar{display:block;width:4px}
    .nav-menu::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
    .nav-menu>li{list-style:none;margin:0;padding:0;flex-shrink:0;display:block}
    .nav-link{padding:13px 14px;font-size:1rem;font-weight:500;border-radius:10px;color:#d0d0d0;white-space:normal;overflow:visible;background:transparent;text-decoration:none;display:flex;align-items:center;gap:10px}
    .nav-link:active,.nav-link:hover{background:rgba(255,255,255,0.06)}
    .nav-link.active{background:rgba(59,130,246,0.15);color:#60a5fa}
  }

  main{padding:16px}
  h2{font-size:18px;margin-bottom:8px}
  p{color:#999;font-size:14px;margin-bottom:16px}
  .test-btn{padding:10px 20px;background:var(--pri);color:white;border:none;border-radius:6px;cursor:pointer;font-size:14px}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/"><span>🔴</span><span>TeslaUSB</span></a>
    <ul class="nav-menu" id="navMenu">
      <li><a href="#" class="nav-link">🏠 <span>仪表盘</span></a></li>
      <li><a href="#" class="nav-link">🛡️ <span>哨兵</span></a></li>
      <li><a href="#" class="nav-link">🎬 <span>视频</span></a></li>
      <li><a href="#" class="nav-link">📶 <span>WiFi</span></a></li>
      <li><a href="#" class="nav-link">📺 <span>媒体</span></a></li>
      <li><a href="#" class="nav-link">☁️ <span>云归档</span></a></li>
      <li><a href="#" class="nav-link">📋 <span>日志</span></a></li>
      <li><a href="#" class="nav-link">⚙️ <span>系统</span></a></li>
      <li><a href="#" class="nav-link">📊 <span>统计</span></a></li>
    </ul>
    <div class="nav-actions">
      <button class="menu-btn" id="menuBtn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<main>
  <h2>Mobile Nav Test Page</h2>
  <p>Resize browser to &lt;768px width. Click the ☰ button.</p>
  <button class="test-btn" onclick="toggleMenu()">Toggle Menu (for testing)</button>
  <div style="height:2000px;background:linear-gradient(to bottom,transparent,rgba(59,130,246,0.05));margin-top:20px;border-radius:8px"></div>
</main>

<script>
function toggleMenu(){
  document.getElementById('navMenu').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
  document.getElementById('menuBtn').classList.toggle('active');
  console.log('Menu toggled. open:', document.getElementById('navMenu').classList.contains('open'));
  console.log('Menu display:', getComputedStyle(document.getElementById('navMenu')).display);
  console.log('Menu height:', document.getElementById('navMenu').offsetHeight);
  console.log('Menu zIndex:', getComputedStyle(document.getElementById('navMenu')).zIndex);
  console.log('Overlay show:', document.getElementById('overlay').classList.contains('show'));
}
</script>

</body>
</html>
